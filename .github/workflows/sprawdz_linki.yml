name: Sprawdz linki

on:
  workflow_dispatch:

jobs:
  run-python-script:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz repozytorium
        uses: actions/checkout@v4

      - name: Ustaw Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Zainstaluj biblioteki
        run: pip install -r requirements.txt

      - name: Uruchom skrypt
        run: python sprawdz_linki.py

      - name: Zapisz wynik jako artifact
        uses: actions/upload-artifact@v4
        with:
          name: wyniki-linkow
          path: |
            wyniki.xlsx
            wyniki.csv
